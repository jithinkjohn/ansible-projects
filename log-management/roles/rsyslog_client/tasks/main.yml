- name: Install rsyslog
  package:
    name: rsyslog
    state: present

- name: Ensure rsyslog is running
  service:
    name: rsyslog
    state: started
    enabled: yes

- name: Configure log forwarding
  template:
    src: client.conf.j2
    dest: /etc/rsyslog.d/forward.conf
    mode: '0644'
  notify: Restart rsyslog
