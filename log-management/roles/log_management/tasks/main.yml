- name: Deploy logrotate config for remote logs
  template:
    src: logrotate_remote.j2
    dest: /etc/logrotate.d/remote_logs
    mode: '0644'
- name: Deploy disk alert script
  template:
    src: disk_alert.sh.j2
    dest: /usr/local/bin/disk_alert.sh
    mode: '0755'

- name: Setup cron job to run disk alert every hour
  cron:
    name: "Disk usage alert for /var/log/remote"
    job: "/usr/local/bin/disk_alert.sh"
    hour: "*"


