- name: Create prometheus user
  user:
    name: "{{ prometheus_user }}"
    shell: /sbin/nologin
    system: true
    create_home: false

- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Copy Prometheus archive
  copy:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/prometheus.tar.gz

- name: Extract Prometheus archive
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true

- name: Copy Prometheus binary
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: /usr/local/bin/prometheus
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Copy promtool binary
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool"
    dest: /usr/local/bin/promtool
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: '0644'
  notify:
    - restart prometheus

- name: Deploy alert rules
  template:
    src: alerts.yml.j2
    dest: /etc/prometheus/alerts.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify:
    - restart prometheus

- name: Deploy Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify:
    - restart prometheus

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: Enable and start Prometheus
  service:
    name: prometheus
    enabled: true
    state: started

- name: Open Prometheus firewall port
  firewalld:
    port: "{{ prometheus_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
